<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بهارات الحكي - البداية 🌶️</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container" id="login-screen">
    <h1>🌶️ بهارات الحكي</h1>
    <input type="text" id="playerName" placeholder="اسمك">
    <button class="btn-create" onclick="createRoom()">إنشاء غرفة جديدة</button>
    <hr>
    <input type="text" id="roomCodeInput" placeholder="كود الغرفة (4 أرقام)">
    <button class="btn-join" onclick="joinRoom()">انضمام لغرفة</button>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
<script src="app.js"></script>
</body>
</html>
